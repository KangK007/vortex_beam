run:
  name: quick_propagation_scan
  output_root: results

beam:
  wavelength: 632.8e-9
  w0: 2.0e-3
  z: 0.2
  alpha: 0.5
  initial_plane: waist
  n_min: -20
  n_max: 20
  grid_n: 96
  rho_max_factor: 4.0
  lmax: 12
  pmax: 12
  nr_fourier: 120
  nphi_fourier: 240

propagation:
  enabled: true
  distance: 0.2
  basis: linear
  method: same
  pad_factor: 1.0
  check_finite: true

turbulence:
  enabled: true
  cn2: 1.0e-16
  n_screens: 1
  dz:
  inner_scale: 2.0e-3
  outer_scale: 50.0
  seed: 1
  spectrum: von_karman

scan:
  alpha_list: [0.3, 0.5, 0.7]
  cn2_list: [0.0, 1.0e-16, 1.0e-15]
  distance_list: [0.2]
  n_mc: 2
  seed: 1

